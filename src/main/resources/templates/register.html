<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Khmer Vote</title>
    <style>
        .reg-box { width: 300px; margin: 50px auto; padding: 20px; border: 1px solid #ccc; border-radius: 10px; }
        input { width: 100%; margin-bottom: 10px; padding: 8px; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
<div class="reg-box">
    <h2>បង្កើតគណនី</h2>
    <input type="text" id="name" placeholder="ឈ្មោះពេញ">
    <input type="email" id="email" placeholder="អាសយដ្ឋាន Email">
    <input type="text" id="phone" placeholder="លេខទូរស័ព្ទ">
    <input type="password" id="password" placeholder="ពាក្យសម្ងាត់">
    <button onclick="handleRegister()">ចុះឈ្មោះឥឡូវនេះ</button>
</div>

<script>
    async function handleRegister() {
        const voterData = {
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value,
            password: document.getElementById('password').value
        };

        const response = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(voterData)
        });

        const result = await response.json();

        if (response.ok) {
            alert(result.message);
            window.location.href = "/verify";
        } else {
            alert("Error: " + result.error);
        }
    }
</script>
</body>
</html>
