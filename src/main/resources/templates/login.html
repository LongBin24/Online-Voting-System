<!DOCTYPE html>
<html lang="en">
<!--xmlns:th="http://www.thymeleaf.org-->
<head>
    <meta charset="UTF-8">
    <title>Login - Online Voting System</title>
    <style>
        body { font-family: 'Khmer OS Battambang', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        h2 { color: #333; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #0056b3; }
        .error { color: red; font-size: 14px; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="login-card">
    <h2>Please Sign In</h2>

    <div th:if="${param.error}" class="error">
        Invalid email or password!
    </div>

    <form th:action="@{/login}" method="post">
        <input type="email" name="username" placeholder="Email Address" required autofocus>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Sign In</button>
    </form>

    <p style="margin-top: 15px; font-size: 14px;">
        Don't have an account? <a href="./register">Register here</a>
    </p>
</div>
</body>
</html>
